            { id: "flatbread", cat: "乳酪餅", type: "flatbread", items: [...jams.map(f => ({ n: f+"乳酪餅", p: 35 })), ...flatbreads.map(m => ({ n: m.n+"乳酪餅+蛋", p: m.p }))] },
            { id: "snack", cat: "小點", type: "snack", items: [{n:"培根", p:15}, {n:"火腿", p:15}, {n:"熱狗(4條)", p:20}, {n:"薯餅", p:20}, {n:"薯條", p:30}, {n:"里肌肉排", p:30}, {n:"小雞球", p:35}, {n:"麥克雞塊(5塊)", p:40}, {n:"檸檬雞柳條(3條)", p:45}, {n:"薯餅塔(黃芥末醬)", p:45}, {n:"法式吐司(蜂蜜)", p:45}, {n:"德式香腸(2條)", p:50}, {n:"生菜沙拉", p:50}, {n:"菲力雞排", p:50}, {n:"卡拉雞腿(辣味)", p:50}, {n:"藍帶豬排", p:50}] },

        let cart = [];

        // 點餐設定全域變數

        // === 2. 初始化與時間管理 ===
        function checkStoreStatus() {
            const now = new Date();
            const day = now.getDay(); // 0 是星期日
            const timeNum = now.getHours() * 100 + now.getMinutes();

            // 營業時間 05:30 ~ 17:00 (最後點餐 16:50)，週日公休
            if (day === 0 || timeNum < 530 || timeNum >= 1650) {
                document.getElementById('closed-overlay').classList.remove('hidden');
                document.getElementById('closed-overlay').classList.add('flex');
                return false;
            }
            return true;
        }

        function generateTimeSlots(bufferMins = 15) {
            const now = new Date();
            now.setMinutes(now.getMinutes() + bufferMins);
            let m = Math.ceil(now.getMinutes() / 5) * 5;
            now.setMinutes(m);
            now.setSeconds(0);

            const slots = [];
            const end = new Date();
            end.setHours(17, 0, 0, 0); // 營業到17:00

            while (now <= end) {
                let hh = String(now.getHours()).padStart(2, '0');
                let mm = String(now.getMinutes()).padStart(2, '0');
                slots.push(`${hh}:${mm}`);
                now.setMinutes(now.getMinutes() + 5);
            }
            return slots;
        }

        function init() {
            if (!checkStoreStatus()) return; // 沒營業就直接擋下

            // 生成取餐時間下拉選單
            const timeSelect = document.getElementById('setup-time');
            const slots = generateTimeSlots();
            timeSelect.innerHTML = slots.map(t => `<option value="${t}">${t}</option>`).join('');
            
            // 顯示歡迎視窗
            document.getElementById('welcome-modal').classList.remove('hidden');
            document.getElementById('welcome-modal').classList.add('flex');

            // 渲染菜單
            const nav = document.getElementById('nav-bar');
            const menuBox = document.getElementById('menu-box');
            
            menuData.forEach((sec, idx) => {
                const btn = document.createElement('button');
                btn.id = `nav-${sec.id}`;
                btn.className = `nav-btn px-4 py-2 text-sm text-gray-500 font-bold rounded-full bg-white shadow-sm ${idx === 0 ? 'active' : ''}`;
                btn.innerText = sec.cat;
                btn.onclick = () => document.getElementById(`sec-${sec.id}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
                nav.appendChild(btn);

                const secDiv = document.createElement('section');
                secDiv.id = `sec-${sec.id}`;
                secDiv.className = "pt-3 scroll-mt-16";
                secDiv.innerHTML = `<h2 class="text-xl font-black mb-4 border-l-4 border-orange-500 pl-3 text-gray-800">${sec.cat}</h2>`;
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 gap-3";

                sec.items.forEach(item => {
                    let pText = sec.type === 'drink' ? (item.pl ? `$${item.pm} / $${item.pl}` : `$${item.pm}`) : `$${item.p}`;
                    grid.innerHTML += `
                        <div onclick='openModal(${JSON.stringify(item)}, "${sec.type}")' class="bg-white p-4 rounded-2xl shadow-sm border flex justify-between items-center active:scale-95 transition-transform cursor-pointer">
                            <span class="font-bold text-gray-700 text-lg">${item.n}</span>
                            <span class="text-orange-600 font-black">${pText} <span class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded-full ml-1 font-bold">+</span></span>
                        </div>`;
                });
                secDiv.appendChild(grid);
                menuBox.appendChild(secDiv);
            });

            // 滑動導航監聽
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        const actBtn = document.getElementById(entry.target.id.replace('sec-', 'nav-'));
                        if (actBtn) { actBtn.classList.add('active'); actBtn.scrollIntoView({ inline: 'center', behavior: 'smooth', block:'nearest' }); }
                    }
                });
            }, { rootMargin: '-20% 0px -70% 0px' });
            document.querySelectorAll('section').forEach(sec => observer.observe(sec));
        }

        // === 點餐設定相關 ===
        function toggleTableInput() {
            const method = document.querySelector('input[name="order_method"]:checked').value;
            const tbInput = document.getElementById('setup-table');
            if (method === '內用') {
                tbInput.classList.remove('hidden');
                tbInput.focus();
            } else {
                tbInput.classList.add('hidden');
            }
        }

        function startOrdering() {
            userMethod = document.querySelector('input[name="order_method"]:checked').value;
            userTable = document.getElementById('setup-table').value;
            userTime = document.getElementById('setup-time').value;

            if (userMethod === '內用' && !userTable) return alert('內用請記得填寫桌號喔！');

            document.getElementById('welcome-modal').classList.add('hidden');
            document.getElementById('welcome-modal').classList.remove('flex');
        }

        // === 3. 動態客製化選項 (同前版) ===
        function openModal(item, type) {
            curItem = item; curItem.type = type;
            basePrice = item.p || (type === 'drink' ? item.pm : 0);
            
            document.getElementById('modal-title').innerText = item.n;
            document.getElementById('modal-note').value = '';
            const dyn = document.getElementById('modal-dynamic-options');
            dyn.innerHTML = '';

            const radio = (grp, val, label, checked, price=0) => `
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="${grp}" value="${val}|${price}" ${checked?'checked':''} class="hidden opt-radio" onchange="calcPrice()">
                    <div class="border-2 p-3 rounded-xl text-center font-bold text-gray-600 transition-colors">${label} ${price!=0 ? (price>0?'+'+price:price) : ''}</div>
                </label>`;
            const check = (grp, val, label, price=0) => `
                <label class="flex-1 cursor-pointer">
                    <input type="checkbox" name="${grp}" value="${val}|${price}" class="hidden opt-checkbox" onchange="calcPrice()">
                    <div class="border-2 p-3 rounded-xl text-center font-bold text-gray-600 transition-colors">${label} ${price!=0 ? '+'+price : ''}</div>
                </label>`;
            
            const eggDoneness = `<div id="egg-wrapper" class="mt-4"><p class="text-sm font-bold text-orange-600 mb-2">蛋的熟度</p>
                <div class="flex gap-2">${radio('egg_done', '全熟', '全熟', true)}${radio('egg_done', '半熟', '半熟', false)}</div></div>`;
            const drinkTemp = (iceOnly=false) => `<p class="text-sm font-bold text-gray-500 mb-2 mt-5">冰塊與溫度 (無少冰)</p>
                <div class="grid grid-cols-4 gap-2">${radio('d_temp', '冰', '冰', true)}${radio('d_temp', '去冰', '去冰', false)}${iceOnly?'':radio('d_temp', '溫', '溫', false)+radio('d_temp', '熱', '熱', false)}</div>`;
            
            if (type !== 'drink' && type !== 'combo' && type !== 'snack') {
                dyn.innerHTML += `<div class="mb-5 flex gap-2">${check('addons', '加起司', '加起司', 10)}</div>`;
            }

            if (type === 'burger' || type === 'toast' || type === 'noodle') {
                dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">蛋的選擇</p>
                    <div class="flex gap-2">${radio('has_egg', '正常含蛋', '正常含蛋', true, 0)}${radio('has_egg', '不加蛋', '不加蛋', false, -5)}</div>${eggDoneness}`;
                let excludes = type === 'toast' ? ['沙拉','小黃瓜','胡椒粉'] : (type === 'burger' ? ['沙拉','生菜','洋蔥','番茄片','番茄醬','胡椒粉'] : []);
                if (excludes.length > 0) dyn.innerHTML += `<p class="font-bold text-red-500 mb-2 mt-5">⚠️ 挑食專區 (不吃請打勾)</p>
                    <div class="grid grid-cols-3 gap-2">${excludes.map(e => check('excludes', '去'+e, '去'+e)).join('')}</div>`;
                if (type === 'toast') dyn.innerHTML += `<div class="mt-5 flex gap-2">${check('addons', '加生菜', '加生菜', 5)}</div>`;
            }

            if (type === 'bread_no_egg') {
                dyn.innerHTML += `<p class="font-bold text-red-500 mb-2">⚠️ 挑食專區 (不吃請打勾)</p>
                    <div class="grid grid-cols-3 gap-2">${['沙拉','生菜','洋蔥','番茄片','番茄醬','胡椒粉'].map(e => check('excludes', '去'+e, '去'+e)).join('')}</div>`;
                dyn.innerHTML += `<div class="mt-5 flex gap-2">${check('addons', '加蛋', '加蛋', 15)}</div><div id="egg-wrapper-hidden" style="display:none;">${eggDoneness}</div>`;
            }

            if (type === 'omelet') {
                dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">醬料選擇</p>
                    <div class="flex gap-2">${radio('sauce', '醬油膏', '醬油膏', true)}${radio('sauce', '辣椒醬油', '辣椒醬油', false)}${radio('sauce', '不加醬', '不加醬', false)}</div>`;
            }

            if (type === 'chinese') {
                dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">醬料選擇</p>
                    <div class="flex flex-wrap gap-2 mb-3">${radio('sauce', '醬油', '醬油', true)}${radio('sauce', '辣椒醬油', '辣椒醬油', false)}${radio('sauce', '不加醬', '不加醬', false)}</div>
                    <div class="flex gap-2 mb-3">${check('condiments','加胡椒粉','加胡椒粉')}</div>`;
                if (item.n === '荷包蛋') dyn.innerHTML += eggDoneness;
                else if (item.n === '蔥抓餅' || item.n === '煎餃' || item.n.includes('蘿蔔糕')) dyn.innerHTML += `<div class="mt-4 flex gap-2">${check('addons', '加蛋', '加蛋', 15)}</div><div id="egg-wrapper-hidden" style="display:none;">${eggDoneness}</div>`;
                else if (item.n.includes('蛋')) dyn.innerHTML += eggDoneness;
            }

            if (type === 'snack') {
                dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">調味選擇</p><div class="flex gap-2">${check('condiments','加胡椒粉','加胡椒粉')}${check('condiments','加番茄醬','加番茄醬')}</div>`;
            }

            if (type === 'jam') {
                if (!item.isTwo) {
                    dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">厚度選擇</p><div class="flex gap-2">${radio('j_thick', '薄片', '薄片', true, 0)}${radio('j_thick', '厚片', '厚片', false, 10)}</div>`;
                } else {
                    let jOpts = jams.map(j => `<option value="${j}">${j}</option>`).join('');
                    dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">選2種口味</p>
                        <div class="flex gap-2"><select id="jam1" class="flex-1 border-2 p-3 rounded-xl font-bold bg-white">${jOpts}</select>
                        <select id="jam2" class="flex-1 border-2 p-3 rounded-xl font-bold bg-white">${jOpts.replace('巧克力', '巧克力" selected"')}</select></div>`;
                }
                dyn.innerHTML += `<div class="mt-5 flex gap-2">${check('addons', '加厚果醬', '加厚果醬', 5)}</div>`;
            }
            
            if (type === 'flatbread') {
                dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">蛋的選擇</p><div class="flex gap-2">${radio('has_egg', '正常含蛋', '正常含蛋', true, 0)}${radio('has_egg', '不加蛋', '不加蛋', false, -5)}</div>${eggDoneness}`;
            }

            if (type === 'drink') {
                if(item.pl) dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">大小杯</p><div class="flex gap-2">${radio('d_size', '中杯', '中杯', true, 0)}${radio('d_size', '大杯', '大杯', false, item.pl - item.pm)}</div>`;
                if(item.n.includes('瓶裝牛奶')) dyn.innerHTML += `<div class="mt-4 flex gap-2">${check('addons', '換杯', '換杯', 5)}</div>`;
                dyn.innerHTML += drinkTemp(item.iceOnly);
            }

            if (type === 'combo') {
                if(item.n.includes('2號餐')) dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">蛋餅醬料</p><div class="flex gap-2 mb-5">${radio('sauce', '醬油膏', '醬油膏', true)}${radio('sauce', '辣椒醬油', '辣椒醬油', false)}${radio('sauce', '不加醬', '不加醬', false)}</div>`;
                if(item.n.includes('兒童餐')) dyn.innerHTML += `<p class="font-bold text-orange-500 mb-2">果醬吐司口味備註</p><input type="text" id="combo-jam-note" placeholder="如：草莓薄片" class="w-full border-2 p-3 rounded-xl mb-4 focus:border-orange-500 outline-none">`;
                if(item.n.includes('蛋')) dyn.innerHTML += eggDoneness;

                let dOpts = '';
                drinks.forEach(d => {
                    if (d.n === '紅茶') { dOpts += `<option value="${d.n}(中)|0">${d.n}(中) +0元</option>`; if(d.l) dOpts += `<option value="${d.n}(大)|${d.l - 15}">${d.n}(大) +${d.l - 15}元</option>`; }
                    else { let diffM = d.m - 10; dOpts += `<option value="${d.n}(中)|${diffM}">${d.n}(中) +${diffM}元</option>`; if(d.l) { let diffL = d.l - 10; dOpts += `<option value="${d.n}(大)|${diffL}">${d.n}(大) +${diffL}元</option>`; } }
                });
                dyn.innerHTML += `<p class="font-bold text-orange-600 mb-2 mt-5">✦ 飲料換購 (依菜單折抵)</p><select id="combo-drink" class="w-full border-2 p-3 rounded-xl font-bold bg-orange-50 text-orange-800 outline-none" onchange="calcPrice()">${dOpts}</select>${drinkTemp()}`;
            }

            dyn.addEventListener('change', (e) => {
                if (e.target.name === 'has_egg') { let wrapper = document.getElementById('egg-wrapper'); if(wrapper) wrapper.style.display = e.target.value.includes('正常') ? 'block' : 'none'; }
                if (e.target.name === 'addons' && e.target.value.includes('加蛋')) { let wrapper = document.getElementById('egg-wrapper-hidden'); if(wrapper) wrapper.style.display = e.target.checked ? 'block' : 'none'; }
            });

            document.getElementById('option-modal').classList.remove('hidden');
            document.getElementById('option-modal').classList.add('flex');
            setTimeout(calcPrice, 10);
        }

        function closeModal() {
            document.getElementById('option-modal').classList.add('hidden');
            document.getElementById('option-modal').classList.remove('flex');
        }

        function calcPrice() {
            let total = basePrice;
            document.querySelectorAll('#modal-dynamic-options input[type="radio"]:checked').forEach(r => total += parseInt(r.value.split('|')[1]||0));
            document.querySelectorAll('#modal-dynamic-options input[type="checkbox"]:checked').forEach(c => total += parseInt(c.value.split('|')[1]||0));
            let comboDrink = document.getElementById('combo-drink');
            if (comboDrink) total += parseInt(comboDrink.value.split('|')[1]||0);
            document.getElementById('modal-price-display').innerText = '$' + total;
        }

        function addToCart() {
            let p = parseInt(document.getElementById('modal-price-display').innerText.replace('$',''));
            let n = curItem.n;
            let details = [];

            document.querySelectorAll('#modal-dynamic-options input[type="radio"]:checked').forEach(r => {
                let val = r.value.split('|')[0];
                if(!['正常含蛋', '薄片', '中杯'].includes(val)) {
                    if (r.name === 'egg_done') {
                        let hasEgg = document.querySelector('input[name="has_egg"]:checked');
                        let addEgg = document.querySelector('input[value^="加蛋|"]:checked');
                        if ((hasEgg && hasEgg.value.includes('正常')) || addEgg || n.includes('蛋') || curItem.type === 'combo') details.push(`[${val}]`);
                    } else if (r.name === 'kids_jam') { details.push(`兒童餐果醬:${val}`); } else { details.push(val); }
                }
            });

            document.querySelectorAll('#modal-dynamic-options input[type="checkbox"]:checked').forEach(c => details.push(c.value.split('|')[0]));

            let comboDrink = document.getElementById('combo-drink');
            if (comboDrink) details.push(`飲:${comboDrink.value.split('|')[0]}`);
            let jam1 = document.getElementById('jam1'); let jam2 = document.getElementById('jam2');
            if (jam1 && jam2) details.push(`(${jam1.value}+${jam2.value})`);

            let note = document.getElementById('modal-note').value;
            if (note) details.push(`備:${note}`);

            cart.push({ n: n, p: p, d: details.join(' / ') });
            updateCart();
            closeModal();
            
            const cBtn = document.getElementById('cart-count');
            cBtn.classList.add('scale-150');
            setTimeout(() => cBtn.classList.remove('scale-150'), 300);
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const cDiv = document.getElementById('cart-items');
            cDiv.innerHTML = '';
            let t = 0;
            cart.forEach((i, idx) => {
                t += i.p;
                let redText = i.d.replace(/不加蛋|去[^\s\/]+|不加醬/g, m => `<span class="text-red-500 font-bold">${m}</span>`);
                cDiv.innerHTML += `
                    <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                        <div><div class="font-bold text-gray-800">${i.n}</div><div class="text-xs text-gray-500 mt-1">${redText}</div></div>
                        <div class="flex items-center gap-3"><span class="font-black text-orange-600">$${i.p}</span>
                        <button onclick="removeCart(${idx})" class="text-red-400 font-bold text-sm bg-red-50 px-2 py-1 rounded">刪除</button></div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = t;
        }

        function removeCart(idx) { cart.splice(idx, 1); updateCart(); }
        
        // === 4. 取餐時間防呆與開啟購物車 ===
        function validateTime() {
            const slots = generateTimeSlots(15);
            let isValid = false;
            // 檢查使用者當初選的時間，是否還大於等於現在的最低備餐時間
            for(let i=0; i<slots.length; i++) {
                if(userTime === slots[i] || userTime > slots[0]) { isValid = true; break; }
            }
            if (!isValid && slots.length > 0) {
                alert(`老闆/老闆娘好，因為您看菜單花了一點時間，為了確保現做品質，取餐時間將為您自動延後到最快的 ${slots[0]} 喔！`);
                userTime = slots[0];
            }
        }

        function toggleCart() {
            const d = document.getElementById('cart-drawer');
            if (d.classList.contains('hidden')) {
                validateTime();
                document.getElementById('display-method').innerText = userMethod;
                document.getElementById('display-table').innerText = userMethod === '內用' ? `(桌號: ${userTable})` : '';
                document.getElementById('display-time').innerText = userTime;

                d.classList.remove('hidden'); d.classList.add('flex');
            } else {
                d.classList.add('hidden'); d.classList.remove('flex');
            }
        }

        // === 5. 歷史紀錄 ===
        function toggleHistory() {
            const d = document.getElementById('history-drawer');
            if (d.classList.contains('hidden')) { renderHistory(); d.classList.remove('hidden'); d.classList.add('flex'); } 
            else { d.classList.add('hidden'); d.classList.remove('flex'); }
        }

        function renderHistory() {
            let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
            const cDiv = document.getElementById('history-items');
            if(myOrders.length === 0) { cDiv.innerHTML = '<div class="text-center text-gray-400 mt-10 font-bold">您還沒有點餐紀錄喔！</div>'; return; }
            
            let html = '';
            myOrders.forEach(order => {
                let itemsHtml = order.items.map(i => `<div class="text-sm text-gray-700">${i.n} ${i.d ? `<span class="text-xs text-orange-500 font-bold ml-1">(${i.d})</span>` : ''}</div>`).join('');
                html += `
                    <div class="bg-white p-4 rounded-xl border shadow-sm relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-red-500 text-white font-black px-4 py-1 rounded-bl-xl shadow-md text-sm">號碼牌 #${order.orderNo}</div>
                        <div class="border-b pb-2 mb-2 mt-4">
                            <div class="text-sm font-bold text-gray-800">${order.method} <span class="text-orange-600 ml-2">🕒 ${order.time}</span></div>
                            <div class="text-xs text-gray-400 mt-1">下單時間: ${order.orderTime}</div>
                        </div>
                        <div class="space-y-1 mb-3">${itemsHtml}</div>
                        <div class="text-right font-black text-orange-600 text-lg border-t pt-2">總計 $${order.total}</div>
                    </div>`;
            });
            cDiv.innerHTML = html;
        }

        // === 6. 產生號碼牌與送出訂單 ===
        function submitOrder() {
            const name = document.getElementById('order-name').value;
            if (!name) return alert("老闆/老闆娘好，結帳前請讓客人輸入稱呼唷！");
            if (cart.length === 0) return alert("購物車目前是空的喔！");

            document.getElementById('btn-submit').innerText = '傳送中...';
            
            let totalAmt = parseInt(document.getElementById('cart-total').innerText);
            let currentTimeStr = new Date().toLocaleString();
            
            // 產生 100~999 的隨機號碼牌
            const orderNo = String(Math.floor(Math.random() * 900) + 100);

            let orderData = {
                orderNo: orderNo,
                customer: name, 
                method: userMethod,
                table: userMethod === '內用' ? userTable : "",
                pickupTime: userTime,
                items: cart,
                total: totalAmt,
                time: currentTimeStr,
                status: "新訂單"
            };

            database.ref('orders').push(orderData).then(() => {
                // 儲存到手機
                let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
                myOrders.unshift({ orderNo: orderNo, method: userMethod, time: userTime, orderTime: currentTimeStr, total: totalAmt, items: cart });
                if(myOrders.length > 15) myOrders.pop();
                localStorage.setItem('meitian_history', JSON.stringify(myOrders));

                alert(`🎉 訂單已送出！\n\n您的號碼牌是：#${orderNo}\n取餐時間：${userTime}\n\n請截圖或至「紀錄」查看。`);
                location.reload();
            }).catch((error) => {
                alert("傳送失敗了，請檢查網路連線：" + error.message);
                document.getElementById('btn-submit').innerText = '🚀 確認送出訂單';
            });
        }

        window.onload = init;
    </script>
</body>
</html>
