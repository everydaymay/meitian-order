    <script>
        const firebaseConfig = { apiKey: "AIzaSyBg6_9BpcXndrwKL0l1jcp5kYdk8qza-4Q", databaseURL: "https://test-7c0ce-default-rtdb.firebaseio.com", projectId: "test-7c0ce", appId: "1:125105855985:web:f4dbef66a2b7df788ff850" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let cart = []; let curItem = null; let basePrice = 0; let userMethod = "外帶"; let userTable = ""; let userTime = ""; let editingIndex = -1;
        let curModalQty = 1;
        let isUserViewingMenu = false; // 追蹤用戶是否手動縮小了追蹤畫面

        function checkActiveOrder() {
            const activeOrderId = localStorage.getItem('meitian_active_order');
            if (activeOrderId) trackLiveOrder(activeOrderId, false);
        }

        // 💡 追蹤畫面控制
        function showTrackingScreen() {
            isUserViewingMenu = false;
            document.getElementById('live-tracking-screen').classList.remove('hidden');
            document.getElementById('live-tracking-screen').classList.add('flex');
            document.getElementById('floating-track-btn').classList.add('hidden');
        }

        function hideTrackingScreen() {
            isUserViewingMenu = true;
            document.getElementById('live-tracking-screen').classList.add('hidden');
            document.getElementById('live-tracking-screen').classList.remove('flex');
            document.getElementById('floating-track-btn').classList.remove('hidden');
        }

        function trackLiveOrder(orderId, forceOpen = true) {
            database.ref('orders/' + orderId).on('value', (snap) => {
                const data = snap.val();
                if (!data) { 
                    hideTrackingScreen();
                    document.getElementById('floating-track-btn').classList.add('hidden');
                    localStorage.removeItem('meitian_active_order');
                    return; 
                }
                
                // 訂單完成
                if (data.status === "已完成") {
                    hideTrackingScreen();
                    document.getElementById('floating-track-btn').classList.add('hidden');
                    localStorage.removeItem('meitian_active_order');
                    alert("✅ 您的餐點已完成，感謝您的購買！");
                    
                    // 順便把歷史紀錄的狀態也改成已完成
                    let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
                    let found = myOrders.find(o => o.orderNo === data.orderNo);
                    if(found) { found.status = "已完成"; localStorage.setItem('meitian_history', JSON.stringify(myOrders)); }
                    return;
                }

                // 更新畫面資料
                document.getElementById('track-order-no-big').innerText = data.orderNo;
                document.getElementById('track-method').innerText = data.method + (data.table ? ` (${data.table})` : '');
                document.getElementById('track-time').innerText = data.pickupTime;
                
                let step = 1; let msg = "等待店家確認"; let subMsg = "訂單已成功送出，請稍候"; let icon = "⏳";
                if (data.status === "製作中") { step = 2; msg = "店家已接單！"; subMsg = "正在為您精心製作中"; icon = "🍳"; }
                if (data.status === "可取餐") { step = 3; msg = "餐點好囉！"; subMsg = "請前往取餐 / 入座享用"; icon = "🎉"; }
                
                document.getElementById('track-icon').innerText = icon;
                document.getElementById('track-message-big').innerText = msg;
                document.getElementById('track-message-big').className = `text-2xl font-black mb-2 ${step === 3 ? 'text-green-600' : 'text-gray-800'}`;
                document.getElementById('track-submessage').innerText = subMsg;
                
                [1, 2, 3].forEach(i => {
                    const stepDiv = document.getElementById('step-big-' + i).firstElementChild;
                    const stepText = document.getElementById('step-big-' + i).lastElementChild;
                    if (i < step) {
                        stepDiv.className = "w-10 h-10 rounded-full bg-orange-500 text-white flex items-center justify-center font-black border-4 border-white shadow-md transition-all";
                        stepText.className = "text-xs font-bold mt-2 text-orange-600 transition-all";
                    } else if (i === step) {
                        stepDiv.className = "w-10 h-10 rounded-full bg-orange-500 text-white flex items-center justify-center font-black border-4 border-white shadow-lg scale-125 transition-all animate-pulse";
                        stepText.className = "text-xs font-black mt-2 text-orange-600 transition-all";
                    } else {
                        stepDiv.className = "w-10 h-10 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center font-black border-4 border-white transition-all";
                        stepText.className = "text-xs font-bold mt-2 text-gray-400 transition-all";
                    }
                });
                
                document.getElementById('progress-line-big').style.width = ((step-1)/2 * 100) + '%';
                
                if (step === 3 && "vibrate" in navigator) navigator.vibrate([200, 100, 200]);

                // 控制顯示邏輯
                if (!isUserViewingMenu || forceOpen || step === 3) {
                    showTrackingScreen();
                } else {
                    document.getElementById('floating-track-btn').classList.remove('hidden');
                }
                
                // 同步更新歷史紀錄狀態
                let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
                let found = myOrders.find(o => o.orderNo === data.orderNo);
                if(found && found.status !== data.status) { found.status = data.status; localStorage.setItem('meitian_history', JSON.stringify(myOrders)); }
            });
        }

        function checkStoreStatus() {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const timeNum = now.getHours() * 100 + now.getMinutes();
            const openNum = parseInt(OPEN_TIME.replace(':',''));
            const lastNum = parseInt(LAST_ORDER.replace(':',''));
            const isHoliday = HOLIDAYS.includes(todayStr);
            const isFixedOff = CLOSED_DAYS.includes(now.getDay());
            const slots = generateTimeSlots(15);
            if (FORCE_CLOSE || isHoliday || isFixedOff || timeNum < openNum || timeNum > lastNum || slots.length === 0) {
                document.getElementById('closed-overlay').classList.remove('hidden');
                document.getElementById('closed-overlay').classList.add('flex');
                document.getElementById('store-hours-text').innerHTML = `營業時間：週一至週六 ${OPEN_TIME} ~ ${LAST_ORDER}<br>(最晚取餐時間 ${MAX_PICKUP})`;
                return false;
            }
            return true;
        }
