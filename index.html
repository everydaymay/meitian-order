        function generateTimeSlots(bufferMins = 15) {
            const now = new Date(); now.setMinutes(now.getMinutes() + bufferMins);
            let m = Math.ceil(now.getMinutes() / 5) * 5; now.setMinutes(m);
            const slots = [];
            const end = new Date(); const [h, mi] = LAST_ORDER.split(':'); end.setHours(h, mi, 0);
            while (now <= end) { slots.push(`${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`); now.setMinutes(now.getMinutes() + 5); }
            return slots;
        }

                const grid = document.createElement('div'); grid.className = "grid grid-cols-1 gap-3";
                sec.items.forEach(item => {
                    let pText = sec.type === 'drink' ? (item.pl ? `$${item.pm} / $${item.pl}` : `$${item.pm}`) : `$${item.p}`;
                    grid.innerHTML += `<div onclick='openModal(${JSON.stringify(item)}, "${sec.type}")' class="bg-white p-4 rounded-2xl shadow-sm border flex justify-between items-center active:scale-95 transition-transform cursor-pointer"><span class="font-bold text-gray-700 text-lg">${item.n}</span><span class="text-orange-600 font-black">${pText} <span class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded-full ml-1 font-bold">+</span></span></div>`;
                });
                secDiv.appendChild(grid); menuBox.appendChild(secDiv);
            });
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                        const actBtn = document.getElementById(entry.target.id.replace('sec-', 'nav-'));
                        if (actBtn) { actBtn.classList.add('active'); actBtn.scrollIntoView({ inline: 'center', behavior: 'smooth', block:'nearest' }); }
                    }
                });
            }, { rootMargin: '-20% 0px -70% 0px' });
            document.querySelectorAll('section').forEach(sec => observer.observe(sec));
        }

            userMethod = document.querySelector('input[name="order_method"]:checked').value;
            userTable = document.getElementById('setup-table').value;
            userTime = document.getElementById('setup-time').value;
            if (userMethod === '內用' && !userTable) return alert('請輸入內用桌號喔！');
            document.getElementById('welcome-modal').classList.add('hidden');
        }

        function openModal(item, type) {
            editingIndex = -1; document.getElementById('add-to-cart-btn').innerText = "確認加入購物車";
            curItem = item; curItem.type = type; basePrice = item.p || (type === 'drink' ? item.pm : 0);
            document.getElementById('modal-title').innerText = item.n; document.getElementById('modal-note').value = '';
            const dyn = document.getElementById('modal-dynamic-options'); dyn.innerHTML = '';
            const radio = (grp, val, label, checked, price=0) => `<label class="flex-1 cursor-pointer"><input type="radio" name="${grp}" value="${val}|${price}" ${checked?'checked':''} class="hidden opt-radio" onchange="calcPrice()"><div class="border-2 p-3 rounded-xl text-center font-bold text-gray-600 transition-colors">${label} ${price!=0 ? (price>0?'+'+price:price) : ''}</div></label>`;
            const check = (grp, val, label, price=0) => `<label class="flex-1 cursor-pointer"><input type="checkbox" name="${grp}" value="${val}|${price}" class="hidden opt-checkbox" onchange="calcPrice()"><div class="border-2 p-3 rounded-xl text-center font-bold text-gray-600 transition-colors">${label} ${price!=0 ? '+'+price : ''}</div></label>`;
            const eggDoneness = `<div id="egg-wrapper" class="mt-4"><p class="text-sm font-bold text-orange-600 mb-2">蛋的熟度</p><div class="flex gap-2">${radio('egg_done', '全熟', '全熟', true)}${radio('egg_done', '半熟', '半熟', false)}</div></div>`;
            const drinkTemp = (iceOnly=false) => `<p class="text-sm font-bold text-gray-500 mb-2 mt-5">冰塊與溫度</p><div class="grid grid-cols-4 gap-2">${radio('d_temp', '冰', '冰', true)}${radio('d_temp', '去冰', '去冰', false)}${iceOnly?'':radio('d_temp', '溫', '溫', false)+radio('d_temp', '熱', '熱', false)}</div>`;
            if (type !== 'drink' && type !== 'combo' && type !== 'snack') dyn.innerHTML += `<div class="mb-5 flex gap-2">${check('addons', '加起司', '加起司', 10)}</div>`;
            if (type === 'burger' || type === 'toast' || type === 'noodle') {
                dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">蛋的選擇</p><div class="flex gap-2">${radio('has_egg', '正常含蛋', '正常含蛋', true, 0)}${radio('has_egg', '不加蛋', '不加蛋', false, -5)}</div>${eggDoneness}`;
                let excludes = type === 'toast' ? ['沙拉','小黃瓜','胡椒粉'] : (type === 'burger' ? ['沙拉','生菜','洋蔥','番茄片','番茄醬','胡椒粉'] : []);
                if (excludes.length > 0) dyn.innerHTML += `<p class="font-bold text-red-500 mb-2 mt-5">⚠️ 挑食專區 (不吃請打勾)</p><div class="grid grid-cols-3 gap-2">${excludes.map(e => check('excludes', '去'+e, '去'+e)).join('')}</div>`;
                if (type === 'toast') dyn.innerHTML += `<div class="mt-5 flex gap-2">${check('addons', '加生菜', '加生菜', 5)}</div>`;
            }
            if (type === 'bread_no_egg') {
                dyn.innerHTML += `<p class="font-bold text-red-500 mb-2">⚠️ 挑食專區 (不吃請打勾)</p><div class="grid grid-cols-3 gap-2">${['沙拉','生菜','洋蔥','番茄片','番茄醬','胡椒粉'].map(e => check('excludes', '去'+e, '去'+e)).join('')}</div>`;
                dyn.innerHTML += `<div class="mt-5 flex gap-2">${check('addons', '加蛋', '加蛋', 15)}</div><div id="egg-wrapper-hidden" style="display:none;">${eggDoneness}</div>`;
            }
            if (type === 'omelet') dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">醬料選擇</p><div class="flex gap-2">${radio('sauce', '醬油膏', '醬油膏', true)}${radio('sauce', '辣椒醬油', '辣椒醬油', false)}${radio('sauce', '不加醬', '不加醬', false)}</div>`;
            if (type === 'chinese') {
                dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">醬料選擇</p><div class="flex flex-wrap gap-2 mb-3">${radio('sauce', '醬油膏', '醬油膏', true)}${radio('sauce', '辣椒醬油', '辣椒醬油', false)}${radio('sauce', '不加醬', '不加醬', false)}</div><div class="flex gap-2 mb-3">${check('condiments','加胡椒粉','加胡椒粉')}</div>`;
                if (item.n === '荷包蛋') dyn.innerHTML += eggDoneness; else if (item.n === '蔥抓餅' || item.n === '煎餃' || item.n === '蘿蔔糕') dyn.innerHTML += `<div class="mt-4 flex gap-2">${check('addons', '加蛋', '加蛋', 15)}</div><div id="egg-wrapper-hidden" style="display:none;">${eggDoneness}</div>`;
            }
            if (type === 'snack') dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">調味選擇</p><div class="flex gap-2">${check('condiments','加胡椒粉','加胡椒粉')}${check('condiments','加番茄醬','加番茄醬')}</div>`;
            if (type === 'jam') {
                if (!item.isTwo) dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">厚度選擇</p><div class="flex gap-2">${radio('j_thick', '薄片', '薄片', true, 0)}${radio('j_thick', '厚片', '厚片', false, 10)}</div>`;
                else {
                    let jOpts = jams.map(j => `<option value="${j}">${j}</option>`).join('');
                    dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">選2種口味</p><div class="flex gap-2"><select id="jam1" class="flex-1 border-2 p-3 rounded-xl font-bold bg-white">${jOpts}</select><select id="jam2" class="flex-1 border-2 p-3 rounded-xl font-bold bg-white">${jOpts.replace('巧克力', '巧克力" selected"')}</select></div>`;
                }
                dyn.innerHTML += `<div class="mt-5 flex gap-2">${check('addons', '加厚果醬', '加厚果醬', 5)}</div>`;
            }
            if (type === 'flatbread') dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">蛋的選擇</p><div class="flex gap-2">${radio('has_egg', '正常含蛋', '正常含蛋', true, 0)}${radio('has_egg', '不加蛋', '不加蛋', false, -5)}</div>${eggDoneness}`;
            if (type === 'drink') {
                if(item.pl) dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">大小杯</p><div class="flex gap-2">${radio('d_size', '中杯', '中杯', true, 0)}${radio('d_size', '大杯', '大杯', false, item.pl - item.pm)}</div>`;
                if(item.n.includes('瓶裝牛奶')) dyn.innerHTML += `<div class="mt-4 flex gap-2">${check('addons', '換杯', '換杯', 5)}</div>`;
                dyn.innerHTML += drinkTemp(item.iceOnly);
            }
            if (type === 'combo') {
                if(item.n.includes('1號餐')) dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">鐵板麵口味 (必選)</p><div class="flex gap-2 mb-5">${radio('n_flavor', '蘑菇', '蘑菇', true)}${radio('n_flavor', '黑胡椒', '黑胡椒', false)}</div>`;
                if(item.n.includes('2號餐')) dyn.innerHTML += `<p class="font-bold text-gray-500 mb-2">蛋餅醬料</p><div class="flex gap-2 mb-5">${radio('sauce', '醬油膏', '醬油膏', true)}${radio('sauce', '辣椒醬油', '辣椒醬油', false)}${radio('sauce', '不加醬', '不加醬', false)}</div>`;
                if(item.n.includes('1號餐') || item.n.includes('3號餐')) dyn.innerHTML += eggDoneness;
                if(item.n.includes('兒童餐')) dyn.innerHTML += `<p class="font-bold text-orange-500 mb-2">巧克力吐司備註 (限20字)</p><input type="text" id="combo-jam-note" maxlength="20" placeholder="例如：去邊 / 切邊" class="w-full border-2 p-3 rounded-xl mb-4 focus:border-orange-500 outline-none">`;
                let dOpts = ''; drinks.forEach(d => {
                    if (d.n === '紅茶') { dOpts += `<option value="${d.n}(中)|0">${d.n}(中) +0元</option>`; if(d.l) dOpts += `<option value="${d.n}(大)|${d.l - 10}">${d.n}(大) +${d.l - 10}元</option>`; }
                    else { let diffM = d.m - 10; dOpts += `<option value="${d.n}(中)|${diffM}">${d.n}(中) +${diffM}元</option>`; if(d.l) { let diffL = d.l - 10; dOpts += `<option value="${d.n}(大)|${diffL}">${d.n}(大) +${diffL}元</option>`; } }
                });
                dyn.innerHTML += `<p class="font-bold text-orange-600 mb-2 mt-5">✦ 飲料換購 (折抵10元)</p><select id="combo-drink" class="w-full border-2 p-3 rounded-xl font-bold bg-orange-50 text-orange-800 outline-none" onchange="calcPrice()">${dOpts}</select>${drinkTemp()}`;
            }
            dyn.addEventListener('change', (e) => {
                if (e.target.name === 'has_egg') { let wrapper = document.getElementById('egg-wrapper'); if(wrapper) wrapper.style.display = e.target.value.includes('正常') ? 'block' : 'none'; }
                if (e.target.name === 'addons' && e.target.value.includes('加蛋')) { let wrapper = document.getElementById('egg-wrapper-hidden'); if(wrapper) wrapper.style.display = e.target.checked ? 'block' : 'none'; }
            });
            document.getElementById('option-modal').classList.remove('hidden'); document.getElementById('option-modal').classList.add('flex');
            dyn.scrollTop = 0; setTimeout(calcPrice, 10);
        }

        function editCart(idx) {
            let itemToEdit = cart[idx]; toggleCart(); openModal(itemToEdit.baseItem, itemToEdit.type);
            editingIndex = idx; document.getElementById('add-to-cart-btn').innerText = "💾 儲存修改";
            setTimeout(() => {
                let raw = itemToEdit.raw; if(!raw) return;
                for(let key in raw.radios) { let r = document.querySelector(`input[name="${key}"][value="${raw.radios[key]}"]`); if(r) r.checked = true; }
                raw.checks.forEach(val => { let c = document.querySelector(`input[type="checkbox"][value="${val}"]`); if(c) c.checked = true; });
                for(let key in raw.selects) { let s = document.getElementById(key); if(s) s.value = raw.selects[key]; }
                if(document.getElementById('combo-jam-note')) document.getElementById('combo-jam-note').value = raw.comboJamNote || '';
                document.getElementById('modal-note').value = itemToEdit.note || '';
                document.querySelectorAll('#modal-dynamic-options input:checked').forEach(el => { el.dispatchEvent(new Event('change', { bubbles: true })); });
                calcPrice();
            }, 50);
        }

        function closeModal() { document.getElementById('option-modal').classList.add('hidden'); }

        function calcPrice() {
            let total = basePrice;
            document.querySelectorAll('#modal-dynamic-options input[type="radio"]:checked').forEach(r => total += parseInt(r.value.split('|')[1]||0));
            document.querySelectorAll('#modal-dynamic-options input[type="checkbox"]:checked').forEach(c => total += parseInt(c.value.split('|')[1]||0));
            let comboDrink = document.getElementById('combo-drink'); if (comboDrink) total += parseInt(comboDrink.value.split('|')[1]||0);
            document.getElementById('modal-price-display').innerText = '$' + total;
        }

        function addToCart() {
            let p = parseInt(document.getElementById('modal-price-display').innerText.replace('$',''));
            let n = curItem.n; let details = [];
            let rawState = { radios: {}, checks: [], selects: {}, comboJamNote: '' };
            document.querySelectorAll('#modal-dynamic-options input[type="radio"]:checked').forEach(r => {
                let val = r.value.split('|')[0]; rawState.radios[r.name] = r.value;
                if(!['正常含蛋', '薄片', '中杯'].includes(val)) {
                    if (r.name === 'egg_done') {
                        let hasEgg = document.querySelector('input[name="has_egg"]:checked'); let addEgg = document.querySelector('input[name="addons"][value^="加蛋"]:checked');
                        if ((hasEgg && hasEgg.value.includes('正常')) || addEgg || n.includes('荷包蛋') || (curItem.type === 'combo' && (n.includes('1號餐') || n.includes('3號餐')))) details.push(`[${val}]`);
                    } else if (r.name === 'n_flavor' && curItem.type === 'combo') { details.push(`${val}口味`); } else { details.push(val); }
                }
            });
            document.querySelectorAll('#modal-dynamic-options input[type="checkbox"]:checked').forEach(c => { rawState.checks.push(c.value); details.push(c.value.split('|')[0]); });
            if (document.getElementById('combo-drink')) { rawState.selects['combo-drink'] = document.getElementById('combo-drink').value; details.push(`飲:${document.getElementById('combo-drink').value.split('|')[0]}`); }
            if (document.getElementById('jam1') && document.getElementById('jam2')) { rawState.selects['jam1'] = document.getElementById('jam1').value; rawState.selects['jam2'] = document.getElementById('jam2').value; details.push(`(${document.getElementById('jam1').value}+${document.getElementById('jam2').value})`); }
            if (document.getElementById('combo-jam-note')) { rawState.comboJamNote = document.getElementById('combo-jam-note').value; details.push(`備:${document.getElementById('combo-jam-note').value}`); }
            let note = document.getElementById('modal-note').value; if (note) details.push(`備:${note}`);
            let cartItemObj = { n, p, d: details.join(' / '), baseItem: curItem, type: curItem.type, raw: rawState, note };
            if (editingIndex > -1) cart[editingIndex] = cartItemObj; else cart.push(cartItemObj);
            updateCart(); closeModal();
            if (editingIndex > -1) { setTimeout(toggleCart, 150); } else { const cBtn = document.getElementById('cart-count'); cBtn.classList.add('scale-150'); setTimeout(() => cBtn.classList.remove('scale-150'), 300); }
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const cDiv = document.getElementById('cart-items'); cDiv.innerHTML = ''; let t = 0;
            cart.forEach((i, idx) => {
                t += i.p; let redText = i.d.replace(/不加蛋|去[^\s\/]+|不加醬/g, m => `<span class="text-red-500 font-bold">${m}</span>`);
                cDiv.innerHTML += `<div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm"><div><div class="font-bold text-gray-800">${i.n}</div><div class="text-xs text-gray-500 mt-1 leading-snug">${redText}</div></div><div class="flex items-center gap-2"><span class="font-black text-orange-600 mr-1">$${i.p}</span><button onclick="editCart(${idx})" class="text-blue-500 font-bold text-sm bg-blue-50 border border-blue-100 px-3 py-1.5 rounded-lg">修改</button><button onclick="removeCart(${idx})" class="text-red-400 font-bold text-sm bg-red-50 border border-red-100 px-3 py-1.5 rounded-lg">刪除</button></div></div>`;
            });
            document.getElementById('cart-total').innerText = t;
        }

        function removeCart(idx) { cart.splice(idx, 1); updateCart(); }

        function toggleCart() {
            const d = document.getElementById('cart-drawer');
            if (d.classList.contains('hidden')) {
                const slots = generateTimeSlots(15);
                if (!(userTime === slots[0] || userTime > slots[0])) { alert(`為確保現做品質，取餐時間已為您自動順延至最快的 ${slots[0]}。`); userTime = slots[0]; }
                document.getElementById('display-method').innerText = userMethod;
                document.getElementById('display-table').innerText = userMethod === '內用' ? `(桌號: ${userTable})` : '';
                document.getElementById('display-time').innerText = userTime;
                d.classList.remove('hidden'); d.classList.add('flex');
            } else { d.classList.add('hidden'); }
        }

        function toggleHistory() {
            const d = document.getElementById('history-drawer');
            if (d.classList.contains('hidden')) { renderHistory(); d.classList.remove('hidden'); d.classList.add('flex'); } else { d.classList.add('hidden'); }
        }

        function renderHistory() {
            let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
            const cDiv = document.getElementById('history-items'); if(myOrders.length === 0) { cDiv.innerHTML = '<div class="text-center text-gray-400 mt-10 font-bold">目前無紀錄喔！</div>'; return; }
            let html = ''; myOrders.forEach(order => {
                let itemsHtml = order.items.map(i => `<div class="text-sm text-gray-700">${i.n} ${i.d ? `<span class="text-xs text-orange-500 font-bold ml-1">(${i.d})</span>` : ''}</div>`).join('');
                html += `<div class="bg-white p-4 rounded-xl border shadow-sm relative overflow-hidden"><div class="absolute top-0 right-0 bg-red-500 text-white font-black px-4 py-1 rounded-bl-xl shadow-md text-sm">#${order.orderNo}</div><div class="border-b pb-2 mb-2 mt-4"><div class="text-sm font-bold text-gray-800">${order.method} 🕒 ${order.time}</div></div><div class="space-y-1 mb-3">${itemsHtml}</div><div class="text-right font-black text-orange-600 text-lg border-t pt-2">總計 $${order.total}</div></div>`;
            });
            cDiv.innerHTML = html;
        }

        function submitOrder() {
            const name = document.getElementById('order-name').value; const phone = document.getElementById('order-phone').value;
            if (!name || !phone) return alert("請輸入您的稱呼與聯絡電話喔！");
            if (cart.length === 0) return alert("購物車目前是空的喔！");
            document.getElementById('btn-submit').innerText = '傳送中...';
            const slots = generateTimeSlots(15); let finalTime = (userTime === slots[0] || userTime > slots[0]) ? userTime : slots[0];
            const orderNo = String(Math.floor(Math.random() * 900) + 100);
            database.ref('orders').push({ orderNo, customer: name, phone, method: userMethod, table: userMethod === '內用' ? userTable : "", pickupTime: finalTime, items: cart, total: parseInt(document.getElementById('cart-total').innerText), time: new Date().toLocaleString(), status: "新訂單" }).then(() => {
                let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
                myOrders.unshift({ orderNo, method: userMethod, time: finalTime, orderTime: new Date().toLocaleString(), total: parseInt(document.getElementById('cart-total').innerText), items: cart });
                if(myOrders.length > 15) myOrders.pop(); localStorage.setItem('meitian_history', JSON.stringify(myOrders));
                alert(`🎉 訂單已送出！\n號碼牌：#${orderNo}\n預計取餐：${finalTime}`); location.reload();
            });
        }
        window.onload = init;
    </script>
</body>
</html>
