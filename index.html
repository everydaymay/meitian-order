    <script>
        const firebaseConfig = { apiKey: "AIzaSyBg6_9BpcXndrwKL0l1jcp5kYdk8qza-4Q", databaseURL: "https://test-7c0ce-default-rtdb.firebaseio.com", projectId: "test-7c0ce", appId: "1:125105855985:web:f4dbef66a2b7df788ff850" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let cart = []; let curItem = null; let basePrice = 0; let userMethod = "外帶"; let userTable = ""; let userTime = ""; let editingIndex = -1;
        let curModalQty = 1;
        let isUserViewingMenu = false; // 追蹤用戶是否手動縮小了追蹤畫面

        function checkActiveOrder() {
            const activeOrderId = localStorage.getItem('meitian_active_order');
            if (activeOrderId) trackLiveOrder(activeOrderId, false);
        }

        // 💡 追蹤畫面控制
        function showTrackingScreen() {
            isUserViewingMenu = false;
            document.getElementById('live-tracking-screen').classList.remove('hidden');
            document.getElementById('live-tracking-screen').classList.add('flex');
            document.getElementById('floating-track-btn').classList.add('hidden');
        }

        function hideTrackingScreen() {
            isUserViewingMenu = true;
            document.getElementById('live-tracking-screen').classList.add('hidden');
            document.getElementById('live-tracking-screen').classList.remove('flex');
            document.getElementById('floating-track-btn').classList.remove('hidden');
        }

        function trackLiveOrder(orderId, forceOpen = true) {
            database.ref('orders/' + orderId).on('value', (snap) => {
                const data = snap.val();
                if (!data) { 
                    hideTrackingScreen();
                    document.getElementById('floating-track-btn').classList.add('hidden');
                    localStorage.removeItem('meitian_active_order');
                    return; 
                }
                
                // 訂單完成
                if (data.status === "已完成") {
                    hideTrackingScreen();
                    document.getElementById('floating-track-btn').classList.add('hidden');
                    localStorage.removeItem('meitian_active_order');
                    alert("✅ 您的餐點已完成，感謝您的購買！");
                    
                    // 順便把歷史紀錄的狀態也改成已完成
                    let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
                    let found = myOrders.find(o => o.orderNo === data.orderNo);
                    if(found) { found.status = "已完成"; localStorage.setItem('meitian_history', JSON.stringify(myOrders)); }
                    return;
                }

                // 更新畫面資料
                document.getElementById('track-order-no-big').innerText = data.orderNo;
                document.getElementById('track-method').innerText = data.method + (data.table ? ` (${data.table})` : '');
                document.getElementById('track-time').innerText = data.pickupTime;
                
                let step = 1; let msg = "等待店家確認"; let subMsg = "訂單已成功送出，請稍候"; let icon = "⏳";
                if (data.status === "製作中") { step = 2; msg = "店家已接單！"; subMsg = "正在為您精心製作中"; icon = "🍳"; }
                if (data.status === "可取餐") { step = 3; msg = "餐點好囉！"; subMsg = "請前往取餐 / 入座享用"; icon = "🎉"; }
                
                document.getElementById('track-icon').innerText = icon;
                document.getElementById('track-message-big').innerText = msg;
                document.getElementById('track-message-big').className = `text-2xl font-black mb-2 ${step === 3 ? 'text-green-600' : 'text-gray-800'}`;
                document.getElementById('track-submessage').innerText = subMsg;
                
                [1, 2, 3].forEach(i => {
                    const stepDiv = document.getElementById('step-big-' + i).firstElementChild;
                    const stepText = document.getElementById('step-big-' + i).lastElementChild;
                    if (i < step) {
                        stepDiv.className = "w-10 h-10 rounded-full bg-orange-500 text-white flex items-center justify-center font-black border-4 border-white shadow-md transition-all";
                        stepText.className = "text-xs font-bold mt-2 text-orange-600 transition-all";
                    } else if (i === step) {
                        stepDiv.className = "w-10 h-10 rounded-full bg-orange-500 text-white flex items-center justify-center font-black border-4 border-white shadow-lg scale-125 transition-all animate-pulse";
                        stepText.className = "text-xs font-black mt-2 text-orange-600 transition-all";
                    } else {
                        stepDiv.className = "w-10 h-10 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center font-black border-4 border-white transition-all";
                        stepText.className = "text-xs font-bold mt-2 text-gray-400 transition-all";
                    }
                });
                
                document.getElementById('progress-line-big').style.width = ((step-1)/2 * 100) + '%';
                
                if (step === 3 && "vibrate" in navigator) navigator.vibrate([200, 100, 200]);

                // 控制顯示邏輯
                if (!isUserViewingMenu || forceOpen || step === 3) {
                    showTrackingScreen();
                } else {
                    document.getElementById('floating-track-btn').classList.remove('hidden');
                }
                
                // 同步更新歷史紀錄狀態
                let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
                let found = myOrders.find(o => o.orderNo === data.orderNo);
                if(found && found.status !== data.status) { found.status = data.status; localStorage.setItem('meitian_history', JSON.stringify(myOrders)); }
            });
        }

        function checkStoreStatus() {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const timeNum = now.getHours() * 100 + now.getMinutes();
            const openNum = parseInt(OPEN_TIME.replace(':',''));
            const lastNum = parseInt(LAST_ORDER.replace(':',''));
            const isHoliday = HOLIDAYS.includes(todayStr);
            const isFixedOff = CLOSED_DAYS.includes(now.getDay());
            const slots = generateTimeSlots(15);
            if (FORCE_CLOSE || isHoliday || isFixedOff || timeNum < openNum || timeNum > lastNum || slots.length === 0) {
                document.getElementById('closed-overlay').classList.remove('hidden');
                document.getElementById('closed-overlay').classList.add('flex');
                document.getElementById('store-hours-text').innerHTML = `營業時間：週一至週六 ${OPEN_TIME} ~ ${LAST_ORDER}<br>(最晚取餐時間 ${MAX_PICKUP})`;
                return false;
            }
            return true;
        }

        // 💡 購物車自動合併雷達
        function addToCart() {
            let p = parseInt(document.getElementById('modal-price-display').innerText.replace('$','')) / curModalQty; 
            let n = curItem.n; let details = []; let rawState = { radios: {}, checks: [], selects: {} };
            document.querySelectorAll('#modal-dynamic-options input[type="radio"]:checked').forEach(r => {
                let val = r.value.split('|')[0]; rawState.radios[r.name] = r.value;
                if(!['正常含蛋', '薄片', '中杯'].includes(val)) {
                    if (r.name === 'egg_done') {
                        let hasEgg = document.querySelector('input[name="has_egg"]:checked'); let addEgg = document.querySelector('input[name="addons"][value^="加蛋"]:checked');
                        if (curItem.type === 'noodle' || (hasEgg && hasEgg.value.includes('正常')) || addEgg || n.includes('荷包蛋')) details.push(`${val}`);
                    } else if (r.name === 'n_flavor' && curItem.type === 'combo') { details.push(`${val}口味`); } else { details.push(val); }
                }
            });
            document.querySelectorAll('#modal-dynamic-options input[type="checkbox"]:checked').forEach(c => { rawState.checks.push(c.value); details.push(c.value.split('|')[0]); });
            if (document.getElementById('combo-drink')) { rawState.selects['combo-drink'] = document.getElementById('combo-drink').value; details.push(`飲:${document.getElementById('combo-drink').value.split('|')[0]}`); }
            let note = document.getElementById('modal-note').value; if (note) details.push(`備:${note}`);
            
            let detailsStr = details.join(' / ');
            let cartItemObj = { n, p, q: curModalQty, d: detailsStr, baseItem: curItem, type: curItem.type, raw: rawState, note };
            
            if (editingIndex > -1) {
                cart[editingIndex] = cartItemObj; 
            } else {
                let foundIndex = cart.findIndex(item => item.n === cartItemObj.n && item.d === cartItemObj.d && item.note === cartItemObj.note);
                if (foundIndex > -1) {
                    cart[foundIndex].q += cartItemObj.q;
                } else {
                    cart.push(cartItemObj);
                }
            }
            updateCart(); closeModal();
        }

        // 🛡️ 防連點金鐘罩啟動！
        function submitOrder() {
            const name = document.getElementById('order-name').value; const phone = document.getElementById('order-phone').value;
            if (!name || !phone) return alert("請填寫姓名和電話喔！");
            
            // 💡 抓取按鈕，如果已經被鎖定了就立刻擋掉
            const submitBtn = document.getElementById('btn-submit');
            if (submitBtn.disabled) return;
            
            // 💡 立刻鎖死按鈕、變灰、改文字
            submitBtn.disabled = true;
            submitBtn.innerText = '🚀 訂單傳送中 ⏳...';
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');

            const now = new Date(); const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const slots = generateTimeSlots(15); let finalTime = (userTime || slots[0]);
            
            database.ref('metadata/daily_counters/' + todayStr).transaction((v) => (v || 0) + 1, (err, comm, snap) => {
                if (err) {
                    // 如果網路不穩失敗了，把按鈕解鎖讓客人重試
                    submitBtn.disabled = false;
                    submitBtn.innerText = '🚀 確認送出訂單';
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    return alert("網路好像有點不穩，請再試一次！");
                }
                
                if (comm) {
                    const orderNo = String(snap.val()).padStart(3, '0');
                    let orderData = { orderNo, customer: name, phone, method: userMethod, table: userTable, pickupTime: finalTime, items: cart, total: parseInt(document.getElementById('cart-total').innerText), time: now.toLocaleString('zh-TW'), status: "新訂單" };
                    
                    const newOrderRef = database.ref('orders').push();
                    newOrderRef.set(orderData).then(() => {
                        let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
                        myOrders.unshift({ orderNo, method: userMethod, time: orderData.pickupTime, total: orderData.total, items: cart, status: "新訂單" });
                        localStorage.setItem('meitian_history', JSON.stringify(myOrders.slice(0,10)));
                        
                        localStorage.setItem('meitian_active_order', newOrderRef.key);
                        location.reload(); 
                    });
                }
            });
        }

        function generateTimeSlots(bufferMins = 15) {
            const now = new Date(); now.setMinutes(now.getMinutes() + bufferMins); let m = Math.ceil(now.getMinutes() / 5) * 5; now.setMinutes(m);
            const slots = []; const end = new Date(); const [h, mi] = MAX_PICKUP.split(':'); end.setHours(h, mi, 0);
            while (now <= end) { slots.push(`${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`); now.setMinutes(now.getMinutes() + 5); }
            return slots;
        }

        function updateCart() {
            // 💡 修正：不再算「有幾種」商品，而是把每個商品的數量加總起來！
            let totalItemsCount = 0;
            cart.forEach(i => {
                totalItemsCount += i.q;
            });
            document.getElementById('cart-count').innerText = totalItemsCount; 
            
            const cDiv = document.getElementById('cart-items'); cDiv.innerHTML = '';
            let t = 0;
            cart.forEach((i, idx) => {
                t += (i.p * i.q);
                let redText = i.d.replace(/不加蛋|去[^\s\/]+|不加醬/g, m => `<span class="text-red-500 font-bold">${m}</span>`);
                cDiv.innerHTML += `
                    <div class="bg-white p-3 rounded-xl border flex flex-col shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <div><div class="font-bold text-gray-800">${i.n}</div><div class="text-xs text-gray-500">${redText}</div></div>
                            <span class="font-black text-orange-600">$${i.p * i.q}</span>
                        </div>
                        <div class="flex justify-between items-center mt-1 pt-2 border-t border-gray-50">
                            <div class="flex items-center gap-3">
                                <button onclick="changeCartQty(${idx}, -1)" class="w-8 h-8 bg-gray-100 rounded-lg font-black">-</button>
                                <span class="font-black text-orange-600 w-4 text-center">${i.q}</span>
                                <button onclick="changeCartQty(${idx}, 1)" class="w-8 h-8 bg-orange-100 text-orange-600 rounded-lg font-black">+</button>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editCart(${idx})" class="text-blue-500 text-sm font-bold bg-blue-50 px-3 py-1.5 rounded-lg">修改</button>
                                <button onclick="removeCart(${idx})" class="text-red-400 text-sm font-bold bg-red-50 px-3 py-1.5 rounded-lg">刪除</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-total').innerText = t;
        }

        function changeCartQty(idx, val) { cart[idx].q = Math.max(1, cart[idx].q + val); updateCart(); }
        function editCart(idx) { let itm = cart[idx]; toggleCart(); openModal(itm.baseItem, itm.type); editingIndex = idx; curModalQty = itm.q; document.getElementById('modal-qty').innerText = curModalQty; document.getElementById('add-to-cart-btn').innerText = "💾 儲存修改"; }
        function removeCart(idx) { cart.splice(idx, 1); updateCart(); }
        function calcPrice() { let total = basePrice; document.querySelectorAll('#modal-dynamic-options input[type="radio"]:checked').forEach(r => total += parseInt(r.value.split('|')[1]||0)); document.querySelectorAll('#modal-dynamic-options input[type="checkbox"]:checked').forEach(c => total += parseInt(c.value.split('|')[1]||0)); let comboDrink = document.getElementById('combo-drink'); if (comboDrink) total += parseInt(comboDrink.value.split('|')[1]||0); document.getElementById('modal-price-display').innerText = '$' + (total * curModalQty); }
        function closeModal() { document.getElementById('option-modal').classList.add('hidden'); }
        function toggleCart() { const d = document.getElementById('cart-drawer'); d.classList.toggle('hidden'); if(!d.classList.contains('hidden')) { document.getElementById('display-method').innerText = userMethod; document.getElementById('display-time').innerText = userTime; } }
        function toggleHistory() { const d = document.getElementById('history-drawer'); d.classList.toggle('hidden'); if(!d.classList.contains('hidden')) renderHistory(); }
        function toggleTableInput() { const method = document.querySelector('input[name="order_method"]:checked').value; document.getElementById('setup-table').classList.toggle('hidden', method !== '內用'); }
        function startOrdering() { userMethod = document.querySelector('input[name="order_method"]:checked').value; userTable = document.getElementById('setup-table').value; userTime = document.getElementById('setup-time').value; if(userMethod === '內用' && !userTable) return alert('請輸入桌號'); document.getElementById('welcome-modal').classList.add('hidden'); }
        
        function renderHistory() {
            let myOrders = JSON.parse(localStorage.getItem('meitian_history') || '[]');
            const hDiv = document.getElementById('history-items');
            if(myOrders.length === 0) { hDiv.innerHTML = '<p class="text-center text-gray-400 mt-10">目前無紀錄</p>'; return; }
            hDiv.innerHTML = myOrders.map(o => `
                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm relative overflow-hidden">
                    ${(o.status === '新訂單' || o.status === '製作中') ? '<div class="absolute top-0 right-0 bg-red-400 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg animate-pulse shadow-sm">處理中</div>' : ''}
                    ${o.status === '可取餐' ? '<div class="absolute top-0 right-0 bg-green-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg animate-pulse shadow-sm">可取餐</div>' : ''}
                    
                    <div class="flex justify-between border-b pb-3 mb-3 items-center mt-2">
                        <div>
                            <span class="font-black text-red-500 text-lg mr-2">#${o.orderNo}</span>
                            <span class="text-xs text-gray-500 font-bold bg-gray-100 px-2 py-1 rounded-md">${o.method}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-[10px] text-gray-400 font-bold">預計取餐</div>
                            <div class="font-black text-orange-600 text-xl leading-tight">${o.time}</div>
                        </div>
                    </div>
                    
                    <div class="text-sm space-y-2 mb-3">
                        ${o.items.map(i => `
                            <div class="flex justify-between text-gray-700">
                                <span>${i.n}</span>
                                <span class="font-black text-gray-500">x ${i.q}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="text-right font-black mt-2 text-xl text-gray-800 border-t pt-2">
                        <span class="text-xs text-gray-400 font-normal mr-1">總計</span>$${o.total}
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
