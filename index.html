<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美天早餐 - 完整菜單系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .menu-item:active { transform: scale(0.98); }
        .nav-active { background-color: #ea580c; color: white; border-color: #ea580c; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center h-screen overflow-hidden text-gray-800">
    <div class="w-full max-w-md bg-white h-full flex flex-col relative shadow-2xl">
        
        <header class="bg-orange-500 text-white p-4 shrink-0 shadow-md">
            <h1 class="text-2xl font-black italic">美天早餐 MAY MAY</h1>
            <p class="text-xs opacity-90">土城區延吉街 | 穩定版 (0元空間)</p>
        </header>

        <div class="flex overflow-x-auto p-2 bg-orange-50 gap-2 hide-scrollbar shrink-0 border-b sticky top-0 z-10">
            <button onclick="scrollToCat('cat-麵包')" class="nav-btn bg-white border-orange-300 border px-4 py-1 rounded-full text-sm font-bold text-orange-700 whitespace-nowrap">漢堡/吐司</button>
            <button onclick="scrollToCat('cat-蛋餅')" class="nav-btn bg-white border-orange-300 border px-4 py-1 rounded-full text-sm font-bold text-orange-700 whitespace-nowrap">蛋餅</button>
            <button onclick="scrollToCat('cat-套餐')" class="nav-btn bg-white border-orange-300 border px-4 py-1 rounded-full text-sm font-bold text-orange-700 whitespace-nowrap">超值套餐</button>
            <button onclick="scrollToCat('cat-果醬')" class="nav-btn bg-white border-orange-300 border px-4 py-1 rounded-full text-sm font-bold text-orange-700 whitespace-nowrap">果醬/厚片</button>
            <button onclick="scrollToCat('cat-麵食')" class="nav-btn bg-white border-orange-300 border px-4 py-1 rounded-full text-sm font-bold text-orange-700 whitespace-nowrap">鐵板麵</button>
            <button onclick="scrollToCat('cat-小點')" class="nav-btn bg-white border-orange-300 border px-4 py-1 rounded-full text-sm font-bold text-orange-700 whitespace-nowrap">炸物點心</button>
            <button onclick="scrollToCat('cat-中式')" class="nav-btn bg-white border-orange-300 border px-4 py-1 rounded-full text-sm font-bold text-orange-700 whitespace-nowrap">中式輕食</button>
            <button onclick="scrollToCat('cat-飲料')" class="nav-btn bg-white border-orange-300 border px-4 py-1 rounded-full text-sm font-bold text-orange-700 whitespace-nowrap">飲料</button>
        </div>

        <div id="menu-box" class="flex-1 overflow-y-auto p-4 space-y-8 pb-48">
            </div>

        <div id="custom-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-xs rounded-2xl p-6 shadow-2xl">
                <h3 id="modal-title" class="text-xl font-bold mb-2 text-orange-600"></h3>
                <p class="text-gray-500 text-sm mb-4">口味要求 (如：去冰、不加美乃滋)</p>
                <input type="text" id="item-note" placeholder="在此輸入特殊要求..." class="w-full border-2 border-orange-100 p-3 rounded-xl mb-4 focus:border-orange-500 outline-none">
                <div class="flex gap-2">
                    <button onclick="closeModal()" class="flex-1 py-3 border rounded-xl font-bold">取消</button>
                    <button onclick="confirmAdd()" class="flex-1 py-3 bg-orange-600 text-white rounded-xl font-bold">加入購物車</button>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 bg-white border-t-4 border-orange-500 p-4 shadow-[0_-10px_30px_rgba(0,0,0,0.2)]">
            <div class="flex gap-2 mb-3">
                <input type="text" id="cus-table" placeholder="桌號" class="w-1/4 border-2 border-orange-100 p-2 rounded-xl text-center font-bold">
                <input type="text" id="cus-name" placeholder="稱呼" class="w-3/4 border-2 border-orange-100 p-2 rounded-xl">
            </div>
            <button onclick="submitFinalOrder()" id="submit-btn" class="w-full bg-orange-600 text-white py-4 rounded-2xl font-black text-xl flex justify-between px-6 shadow-lg active:bg-orange-700">
                <span>確認送出 🚀</span>
                <span id="display-total">$0</span>
            </button>
        </div>
    </div>

    <script>
        // 1. 完整菜單資料 (老闆可在此修改價格 p:價格)
        const menuData = {
            "麵包": [
                {n:"里肌豬排(堡/吐/法/總)", p:55}, {n:"卡拉雞腿(堡/吐/法/總)", p:65}, {n:"嫩煎雞肉(堡/吐/法/總)", p:50}, {n:"牛肉培根(堡/吐/法/總)", p:70}, 
                {n:"香雞排(堡/吐/法/總)", p:45}, {n:"菲力雞排(堡/吐/法/總)", p:50}, {n:"鮪魚蛋(堡/吐/法/總)", p:45}, {n:"培根蛋(堡/吐/法/總)", p:40},
                {n:"燻雞蛋(堡/吐/法/總)", p:45}, {n:"薯餅蛋(堡/吐/法/總)", p:40}, {n:"鮮蔬蛋(堡/吐/法/總)", p:35}, {n:"肉排蛋(堡/吐/法/總)", p:45},
                {n:"起司蛋(堡/吐/法/總)", p:35}, {n:"火腿蛋(堡/吐/法/總)", p:35}, {n:"玉米蛋(堡/吐/法/總)", p:35}, {n:"肉鬆蛋(堡/吐/法/總)", p:35}, {n:"煎蛋(堡/吐/法/總)", p:25}
            ],
            "蛋餅": [
                {n:"原味蛋餅", p:25}, {n:"玉米蛋餅", p:35}, {n:"起司蛋餅", p:35}, {n:"火腿蛋餅", p:35}, {n:"肉鬆蛋餅", p:35}, {n:"培根蛋餅", p:40},
                {n:"鮪魚蛋餅", p:45}, {n:"薯餅蛋餅", p:45}, {n:"豬排蛋餅", p:50}, {n:"卡拉蛋餅", p:60}, {n:"燻雞蛋餅", p:50}, {n:"肉排蛋餅", p:50},
                {n:"熱狗蛋餅", p:40}, {n:"蔬菜蛋餅", p:40}, {n:"九層塔蛋餅", p:40}, {n:"香菜蛋餅", p:40}, {n:"肉燥蛋餅", p:45}, {n:"高麗菜蛋餅", p:45}
            ],
            "套餐": [
                {n:"1號餐(漢堡+蛋+奶茶)", p:85}, {n:"2號餐(鐵板麵+豬排+蛋+紅茶)", p:110}, {n:"3號餐(蛋餅+蘿蔔糕+奶茶)", p:95}, {n:"4號餐(兒童餐)", p:65}
            ],
            "果醬": [
                {n:"草莓(薄/厚/乳)", p:20}, {n:"巧克力(薄/厚/乳)", p:20}, {n:"花生(薄/厚/乳)", p:20}, {n:"奶酥(薄/厚/乳)", p:20},
                {n:"香蒜(薄/厚/乳)", p:20}, {n:"奶油(薄/厚/乳)", p:20}, {n:"椰香(薄/厚/乳)", p:20}, {n:"雙色果醬厚片(7選2)", p:35}
            ],
            "麵食": [
                {n:"黑胡椒麵+蛋", p:50}, {n:"蘑菇麵+蛋", p:50}, {n:"義大利肉醬麵+蛋", p:60}, {n:"沙茶炒麵+蛋", p:60}, {n:"宮保雞丁麵+蛋", p:65}, {n:"打拋豬肉麵+蛋", p:65}
            ],
            "小點": [
                {n:"手工蘿蔔糕", p:35}, {n:"薯條", p:30}, {n:"雞塊(5塊)", p:35}, {n:"熱狗(3支)", p:25}, {n:"薯餅(1片)", p:20}, {n:"雞米花", p:40},
                {n:"洋蔥圈", p:35}, {n:"小熱狗(5支)", p:25}, {n:"甜不辣", p:30}, {n:"花枝丸", p:35}, {n:"蔥抓餅", p:35}, {n:"蔥餅加蛋", p:45},
                {n:"地瓜球", p:35}, {n:"銀絲卷", p:30}, {n:"起司條", p:40}, {n:"德式香腸", p:35}
            ],
            "中式": [
                {n:"煎餃(8顆)", p:40}, {n:"小籠包(6顆)", p:50}, {n:"燒餅蛋", p:35}, {n:"飯糰蛋", p:45}, {n:"鹹豆漿", p:30}, {n:"荷包蛋", p:15}, {n:"蔥蛋", p:25}
            ],
            "飲料": [
                {n:"美天奶茶(中/大)", p:25}, {n:"美天紅茶(中/大)", p:20}, {n:"研磨咖啡", p:45}, {n:"無糖豆漿", p:25}, {n:"柳橙汁", p:30}, {n:"薏仁漿", p:30},
                {n:"米漿", p:25}, {n:"鮮奶茶", p:45}, {n:"拿鐵咖啡", p:55}, {n:"巧克力牛奶", p:40}, {n:"玉米濃湯", p:35}, {n:"鹹豆漿", p:30},
                {n:"檸檬紅茶", p:25}, {n:"百香果汁", p:30}, {n:"茉莉綠茶", p:20}, {n:"可樂", p:25}
            ]
        };

        // 2. 初始化菜單生成
        const menuBox = document.getElementById('menu-box');
        for (const [cat, items] of Object.entries(menuData)) {
            let section = document.createElement('section');
            section.id = `cat-${cat}`;
            section.innerHTML = `<h3 class="font-black border-l-4 border-orange-500 pl-2 mb-4 text-xl text-gray-700">${cat}</h3>`;
            let grid = document.createElement('div');
            grid.className = "grid grid-cols-1 gap-3";
            
            items.forEach(item => {
                grid.innerHTML += `
                    <div onclick="openModal('${item.n}', ${item.p})" class="menu-item flex justify-between items-center p-4 border rounded-2xl bg-white shadow-sm hover:border-orange-300 transition-all">
                        <span class="font-bold text-gray-700">${item.n}</span>
                        <span class="text-orange-600 font-black text-lg">$${item.p} <span class="text-xs bg-orange-100 px-2 py-1 rounded-full text-orange-500 ml-1">＋</span></span>
                    </div>
                `;
            });
            section.appendChild(grid);
            menuBox.appendChild(section);
        }

        // 3. 購物車邏輯
        let cart = [];
        let total = 0;
        let tempItem = null;

        function openModal(name, price) {
            tempItem = { name, price };
            document.getElementById('modal-title').innerText = name;
            document.getElementById('item-note').value = "";
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
        }

        function confirmAdd() {
            const note = document.getElementById('item-note').value;
            cart.push({ ...tempItem, note: note || "無特殊要求" });
            total += tempItem.price;
            document.getElementById('display-total').innerText = '$' + total;
            closeModal();
        }

        function scrollToCat(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
            // 更新按鈕顏色
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('nav-active'));
            event.target.classList.add('nav-active');
        }

        // 4. Firebase 送出訂單
        const firebaseConfig = {
            apiKey: "AIzaSyBg6_9BpcXndrwKL0l1jcp5kYdk8qza-4Q",
            databaseURL: "https://test-7c0ce-default-rtdb.firebaseio.com",
            projectId: "test-7c0ce",
            appId: "1:125105855985:web:f4dbef66a2b7df788ff850"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function submitFinalOrder() {
            const name = document.getElementById('cus-name').value;
            const table = document.getElementById('cus-table').value;
            if (!name) return alert("請輸入您的稱呼，方便我們叫號！");
            if (cart.length === 0) return alert("您的購物車還是空的喔！");

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = "傳送中...";

            database.ref('orders').push({
                customer: name,
                table: table || "外帶",
                items: cart,
                total: total,
                time: new Date().toLocaleString(),
                status: "新訂單"
            }).then(() => {
                alert("🎉 訂單已送到店內囉！請等候叫號。");
                location.reload(); 
            });
        }
    </script>
</body>
</html>
